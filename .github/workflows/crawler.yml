name: "WhereIsIt Crawler"

on:
  schedule:
    # Run Hy-Vee crawler every Wednesday at 6am UTC (weekly ads usually drop mid-week)
    - cron: "0 6 * * 3"
  workflow_dispatch: # Allow manual triggering

jobs:
  crawl-hyvee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run Hy-Vee crawler
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: python crawler/crawl_hyvee.py

      - name: Upload crawl output
        uses: actions/upload-artifact@v4
        with:
          name: hyvee-crawl-${{ github.run_number }}
          path: crawler/output/
          retention-days: 30

