<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhereIsIt — Find Anything at Hy-Vee</title>
  <meta name="description" content="Find any product at Hy-Vee instantly. Know the exact aisle before you walk in.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<!-- ═══════════════════════════════════
     HEADER — Hy-Vee Red Bar
     ═══════════════════════════════════ -->
<header class="hv-header" id="hv-header">
  <div class="hv-header-inner">
    <div class="hv-logo" onclick="window.location.reload()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span class="hv-logo-text">WhereIsIt</span>
    </div>
    <!-- Search bar integrated in header -->
    <div class="hv-search-bar">
      <svg class="hv-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search products at Hy-Vee..." autocomplete="off" />
      <button class="hv-search-clear hidden" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <!-- Store selector in header -->
    <button class="hv-store-btn" id="store-btn" onclick="showStorePicker()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="store-name">Hy-Vee</span>
    </button>
  </div>
  <!-- Sub-nav: Quick category pills -->
  <div class="hv-subnav">
    <div class="hv-subnav-inner" id="subnav-pills"></div>
  </div>
</header>

<!-- ═══════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════ -->
<main class="hv-main">

  <!-- Default browse view -->
  <div id="browse-view">
    <!-- Store info bar -->
    <div class="hv-store-info">
      <div class="hv-store-info-left">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#CC0000" stroke="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3" fill="white"/></svg>
        <div>
          <div class="hv-store-info-name" id="store-info-name">Hy-Vee (Rice Road)</div>
          <div class="hv-store-info-addr" id="store-address">301 NE Rice Rd, Lee's Summit, MO 64086</div>
        </div>
      </div>
      <button class="hv-change-store" onclick="showStorePicker()">Change Store</button>
    </div>

    <!-- Departments grid -->
    <section class="hv-section">
      <h2 class="hv-section-title">Shop by Department</h2>
      <div class="hv-dept-grid" id="dept-grid"></div>
    </section>

    <!-- Recent searches -->
    <section class="hv-section hidden" id="recent-section">
      <div class="hv-section-header">
        <h2 class="hv-section-title">Recent Searches</h2>
        <button class="hv-text-btn" onclick="clearRecent()">Clear All</button>
      </div>
      <div class="hv-recent-list" id="recent-list"></div>
    </section>

    <!-- Horizontal scrolling product rows (Hy-Vee style) -->
    <section class="hv-section" id="carousel-snacks"></section>
    <section class="hv-section" id="carousel-dairy"></section>
    <section class="hv-section" id="carousel-frozen"></section>
    <section class="hv-section" id="carousel-beverages"></section>
    <section class="hv-section" id="carousel-bakery"></section>
    <section class="hv-section" id="carousel-cereal"></section>
  </div>

  <!-- Search results view -->
  <div id="search-view" class="hidden">
    <div class="hv-results-header" id="results-header"></div>
    <div class="hv-product-grid" id="search-results"></div>
  </div>

</main>

<!-- ═══════════════════════════════════
     STORE PICKER MODAL
     ═══════════════════════════════════ -->
<div class="hv-modal hidden" id="store-picker">
  <div class="hv-modal-backdrop" onclick="hideStorePicker()"></div>
  <div class="hv-modal-content">
    <div class="hv-modal-header">
      <h3>Choose Your Hy-Vee</h3>
      <button class="hv-modal-close" onclick="hideStorePicker()">✕</button>
    </div>
    <div class="hv-store-list" id="store-list"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
